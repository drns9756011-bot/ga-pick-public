<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>픽견적 관리자</title>
    <meta name="description" content="픽견적 판매자 신청, 고객 견적, 알림톡 발송 상태를 관리하는 운영자 페이지입니다." />
    <link rel="stylesheet" href="admin.css?v=20260722-position-edit" />
    <script defer src="admin.js?v=20260723-seller-reject-reason"></script>
    <script defer src="admin-accordion.js?v=20260719-admin-accordion"></script>
  </head>
  <body>
    <aside class="sidebar">
      <a class="brand" href="#dashboard" aria-label="픽견적 관리자 홈">
        <span class="brand-mark">P</span>
        <span>
          픽견적
          <small>관리자 콘솔</small>
        </span>
      </a>
      <nav class="side-nav" aria-label="관리자 메뉴">
        <span class="nav-label">운영 메뉴</span>
        <a href="#dashboard">관리 현황</a>
        <a href="#customerQuotes">고객 견적</a>
        <a href="#sellerReview">판매자 신청</a>
        <a href="#approvedSellers">승인 판매자</a>
        <a href="#alimtalkControl">알림톡 상태</a>
      </nav>
      <a class="home-link" href="https://ga-pick.com/" target="_blank" rel="noopener">서비스 화면으로</a>
    </aside>

    <main class="admin-shell" id="dashboard">
      <header class="admin-header">
        <div>
          <p class="eyebrow">Back Office</p>
          <h1>판매자 신청과 고객 견적을 한곳에서 관리하세요.</h1>
          <p class="header-copy">승인 대기, 저장된 고객 견적, 알림톡 상태, 승인 판매자 계정을 운영자가 빠르게 확인할 수 있습니다.</p>
        </div>
        <div class="admin-actions">
          <a class="ghost-btn" href="https://ga-pick.com/" target="_blank" rel="noopener">서비스 화면</a>
          <button class="primary-btn" id="refreshBtn" type="button">새로고침</button>
        </div>
      </header>

      <section class="stat-grid" id="statGrid" aria-label="관리 현황"></section>

      <section class="workspace" id="sellerReview">
        <section class="panel queue-panel" id="applications">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Seller Review</p>
              <h2>판매자 등록 신청</h2>
            </div>
            <div class="segmented" aria-label="신청 상태 필터">
              <button class="is-active" type="button" data-application-filter="pending">대기</button>
              <button type="button" data-application-filter="approved">승인</button>
              <button type="button" data-application-filter="rejected">반려</button>
              <button type="button" data-application-filter="all">전체</button>
            </div>
          </div>
          <label class="search-box">
            신청 검색
            <input id="applicationSearch" type="search" placeholder="지점명, 매니저명, 아이디, 연락처 검색" />
          </label>
          <div class="application-list" id="applicationList"></div>
        </section>

        <aside class="panel detail-panel" id="applicationDetail"></aside>
      </section>

      <section class="grid-two">
        <section class="panel" id="approvedSellers">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Approved Sellers</p>
              <h2>승인 판매자</h2>
            </div>
          </div>
          <div class="seller-table-wrap">
            <table>
              <thead>
                <tr>
                  <th>지점명</th>
                  <th>매니저</th>
                  <th>담당 지역</th>
                  <th>아이디</th>
                </tr>
              </thead>
              <tbody id="approvedSellerRows"></tbody>
            </table>
          </div>
        </section>

        <section class="panel" id="alimtalkControl">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Alimtalk</p>
              <h2>알림톡 발송 상태</h2>
            </div>
            <div class="segmented" aria-label="알림톡 상태 필터">
              <button type="button" data-message-filter="ready">대기</button>
              <button type="button" data-message-filter="accepted">접수됨</button>
              <button type="button" data-message-filter="sent">발송완료</button>
              <button class="is-active" type="button" data-message-filter="all">전체</button>
            </div>
          </div>
          <div class="message-list" id="messageList"></div>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
